name: Bug report
description: Report a defect in OpenAgno
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill in the fields below so we can reproduce and triage quickly.
        If this is a security vulnerability, please **do not** open a public issue; email `security@datatensei.com` instead.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What did you expect to happen? What actually happened?
      placeholder: Clear, concise description.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or configuration to reproduce the behavior.
      placeholder: |
        1. Run `openagno init --template personal_assistant`
        2. Edit `workspace/config.yaml` so that ...
        3. Start the runtime with `openagno start --foreground`
        4. See error ...
      render: markdown
    validations:
      required: true
  - type: input
    id: openagno_version
    attributes:
      label: OpenAgno version
      placeholder: "1.3.0"
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04"
    validations:
      required: true
  - type: dropdown
    id: channel
    attributes:
      label: Channel involved (if any)
      options:
        - Not channel-related
        - WhatsApp Cloud API (single-tenant)
        - WhatsApp Cloud API (multi-tenant, per-tenant webhook)
        - WhatsApp QR (Baileys bridge)
        - Slack
        - Telegram
        - AG-UI
        - A2A
        - Web
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack traces
      description: Paste the smallest snippet that shows the problem. Scrub any secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran `openagno validate` and the report is clean
          required: false
        - label: I searched existing issues for duplicates
          required: true
