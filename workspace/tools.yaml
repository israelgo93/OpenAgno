builtin:
- name: duckduckgo
  enabled: true
  config: {}
- name: crawl4ai
  enabled: true
  config:
    max_length: 2000
- name: reasoning
  enabled: true
  config:
    add_instructions: true
optional:
- name: email
  enabled: false
  config:
    sender_email: ${GMAIL_SENDER}
    sender_name: MaxAgno
    sender_passkey: ${GMAIL_PASSKEY}
    receiver_email: ${GMAIL_RECEIVER}
- name: tavily
  enabled: true
- name: spotify
  enabled: false
- name: shell
  enabled: false
- name: workspace
  enabled: true
  description: Auto-configuracion del workspace (CRUD agentes, instrucciones, tools)
- name: scheduler_mgmt
  enabled: true
  description: Gestion de recordatorios y crons via API REST nativa
custom: []
