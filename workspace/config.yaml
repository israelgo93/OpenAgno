agent:
  name: MagnoPM
  id: agnobot-main
  description: Agente de orquestacion de agentes.
model:
  provider: aws_bedrock_claude
  id: us.anthropic.claude-opus-4-6-v1
  aws_region: us-east-1
database:
  type: supabase
  knowledge_table: agnobot_knowledge_contents
  vector_table: agnobot_knowledge_vectors
vector:
  search_type: hybrid
  embedder: text-embedding-3-small
  max_results: 5
channels:
- whatsapp
whatsapp:
  mode: qr_link
memory:
  enable_agentic_memory: true
  num_history_runs: 5
agentos:
  id: agnobot-gateway
  name: MagnoPM Platform
  port: 8000
  tracing: true
  enable_mcp_server: true
studio:
  enabled: true
a2a:
  enabled: false
scheduler:
  enabled: true
  poll_interval: 15
  timezone: America/Guayaquil
knowledge:
  auto_ingest_docs: true
  auto_ingest_urls: true
  skip_if_exists: true
audio:
  auto_transcribe: true
  stt_model: gpt-4o-mini-transcribe
  tts_enabled: false
  tts_model: tts-1
  tts_voice: nova
