agent:
  name: AgnoBot
  id: agnobot-main
  description: Asistente IA multimodal con workspace declarativo

model:
  provider: google
  id: gemini-2.5-flash

fallback:
  enabled: false

database:
  type: local
  knowledge_table: agnobot_knowledge_contents
  vector_table: agnobot_knowledge_vectors

vector:
  search_type: hybrid
  embedder: text-embedding-3-small
  max_results: 5

channels:
  - whatsapp

whatsapp:
  mode: cloud_api   # cloud_api | qr_link | dual

memory:
  enable_agentic_memory: true
  num_history_runs: 5

agentos:
  id: agnobot-gateway
  name: AgnoBot Platform
  port: 8000
  tracing: true
  enable_mcp_server: true

studio:
  enabled: true

a2a:
  enabled: false

scheduler:
  enabled: true
  poll_interval: 15
  timezone: America/Guayaquil

knowledge:
  auto_ingest_docs: true
  auto_ingest_urls: true
  skip_if_exists: true

audio:
  auto_transcribe: false
  stt_model: whisper-1
  tts_enabled: false
  tts_model: tts-1
  tts_voice: nova
