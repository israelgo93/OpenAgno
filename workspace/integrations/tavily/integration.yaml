# Integracion Tavily — activa con enabled: true y define TAVILY_API_KEY
# (en config.env de esta carpeta o en el .env raiz del repo)

id: tavily
enabled: true

# Vacio: no cargar config.env aqui; usa variables del .env raiz.
# Si quieres claves solo por integracion: env_file: config.env
env_file: config.env

optional_tool: tavily

