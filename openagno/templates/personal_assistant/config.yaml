agent:
  name: OpenAgno Personal Assistant
  id: openagno-personal-main
  description: Asistente personal multimodal listo para automatizar tareas diarias.

model:
  provider: google
  id: gemini-2.5-flash

database:
  type: local
  knowledge_table: agnobot_knowledge_contents
  vector_table: agnobot_knowledge_vectors

vector:
  search_type: hybrid
  embedder: text-embedding-3-small
  max_results: 5

channels:
  - whatsapp

whatsapp:
  mode: cloud_api

memory:
  enable_agentic_memory: true
  num_history_runs: 5

agentos:
  id: openagno-personal-gateway
  name: OpenAgno Personal Assistant
  port: 8000
  tracing: true
  enable_mcp_server: true

studio:
  enabled: true

scheduler:
  enabled: true
  poll_interval: 15
  timezone: America/Guayaquil

knowledge:
  auto_ingest_docs: true
  auto_ingest_urls: true
  skip_if_exists: true
