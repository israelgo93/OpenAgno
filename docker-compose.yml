services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai}
      POSTGRES_USER: ${POSTGRES_USER:-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5532:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway:
    build: .
    command: python gateway.py
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  # WhatsApp QR Bridge (opcional, solo si mode=qr_link o dual)
  whatsapp-bridge:
    build: ./bridges/whatsapp-qr
    ports:
      - "3001:3001"
    environment:
      - GATEWAY_URL=http://gateway:8000
      - SESSION_DIR=/data/session
      - BRIDGE_PORT=3001
    volumes:
      - whatsapp_session:/data/session
    depends_on:
      - gateway
    profiles:
      - qr  # Solo se levanta con: docker compose --profile qr up

volumes:
  pgdata:
  whatsapp_session:
